<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mulai Ngawal - Tulis Artikel Baru | Tukang Kawal</title>
    <link href="./src/output.css" rel="stylesheet">
</head>

<body class="!bg-[#f9fafb] !block">
    <header class="sticky top-0 flex shadow-[0_2px_12px_rgba(0,0,0,.25)] bg-navy justify-around items-center z-[2]">
        <div class="max-w-[1160px] px-6 flex items-center">
            <a href="index.html" class="font-playfair no-underline text-white text-[25px] font-bold"><span class="inline-flex items-center justify-center w-9 h-9 bg-linear-to-br from-brand to-[#7e85a7] text-white font-playfair text-[20px] mb-[5px] font-extrabold rounded-lg mr-2.5 shrink-0 align-middle leading-none">T</span>TukangKawal</a>
            <nav>
                <ul class="header-nav flex items-center gap-5 list-none transition-all duration-500 py-5 px-[30px]">
                    <li><a href="index.html?category=business" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Business</a></li>
                    <li><a href="index.html?category=entertainment" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Entertainment</a></li>
                    <li><a href="index.html?category=health" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Health</a></li>
                    <li><a href="index.html?category=science" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Science</a></li>
                    <li><a href="index.html?category=sports" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Sports</a></li>
                    <li><a href="index.html?category=technology" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Technology</a></li>
                </ul>
            </nav>
        </div>
        <div class="header-action flex items-center gap-3">
            <a href="langganan.html" class="no-underline bg-brand text-white py-2.5 px-[15px] rounded-lg border-none cursor-pointer text-[15px] font-semibold">Pengawal Eksklusif</a>
            <a href="login.html" class="no-underline bg-brand text-white py-2.5 px-[15px] rounded-lg border-none cursor-pointer text-[15px] font-semibold">Masuk/Daftar</a>
        </div>
    </header>

    <main class="main-container-responsive max-w-[900px] mx-auto pt-[50px] px-5 pb-20">
        <div class="text-center mb-10">
            <h1 class="page-title-responsive font-playfair text-[42px] text-[#111827] mb-2.5">Mulai Ngawal</h1>
            <p class="text-[#6b7280] text-base font-dm-sans">Sampaikan berita, fakta, atau laporan investigasi Anda kepada publik.</p>
        </div>

        <div class="card-responsive bg-white rounded-xl border border-[#e5e7eb] p-10 shadow-[0_4px_6px_-1px_rgba(0,0,0,0.05),0_2px_4px_-1px_rgba(0,0,0,0.03)]">
            <div class="mb-[30px] border-b border-[#e5e7eb] pb-[15px]">
                <span class="text-[22px] font-semibold text-[#111827]">Tulis Artikel Baru</span>
            </div>

            <div class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[14px] font-semibold text-[#374151]">Judul & Label</label>
                    <input class="w-full py-3.5 px-4 border border-[#e5e7eb] rounded-lg font-dm-sans text-[15px] text-[#111827] outline-none transition-all duration-200 bg-[#f9fafb] focus:border-primary-blue focus:shadow-[0_0_0_3px_rgba(30,58,138,0.15)] focus:bg-white" type="text" placeholder="Masukkan judul artikel...">
                    <input class="w-full py-3.5 px-4 border border-[#e5e7eb] rounded-lg font-dm-sans text-[15px] text-[#111827] outline-none transition-all duration-200 bg-[#f9fafb] focus:border-primary-blue focus:shadow-[0_0_0_3px_rgba(30,58,138,0.15)] focus:bg-white" type="text" placeholder="Tag (pisahkan dengan koma) cth: pemilu, 2024">
                </div>

                <div class="form-row-responsive grid grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-[14px] font-semibold text-[#374151]">Kategori</label>
                        <select class="w-full py-3.5 px-4 border border-[#e5e7eb] rounded-lg font-dm-sans text-[15px] text-[#111827] outline-none transition-all duration-200 bg-[#f9fafb] focus:border-primary-blue focus:shadow-[0_0_0_3px_rgba(30,58,138,0.15)] focus:bg-white">
                            <option>Politik</option>
                            <option>Ekonomi Bisnis</option>
                            <option>Hukum</option>
                            <option>Kriminal</option>
                            <option>Lingkungan</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[14px] font-semibold text-[#374151]">Gambar Utama</label>
                        <input type="file" class="w-full py-3.5 px-4 border border-[#e5e7eb] rounded-lg font-dm-sans text-[15px] text-[#111827] outline-none transition-all duration-200 bg-[#f9fafb] focus:border-primary-blue focus:shadow-[0_0_0_3px_rgba(30,58,138,0.15)] focus:bg-white" accept="image/*">
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[14px] font-semibold text-[#374151]">Konten Artikel</label>
                    <textarea class="w-full py-3.5 px-4 border border-[#e5e7eb] rounded-lg font-dm-sans text-[15px] text-[#111827] outline-none transition-all duration-200 bg-[#f9fafb] resize-y min-h-[250px] leading-[1.6] focus:border-primary-blue focus:shadow-[0_0_0_3px_rgba(30,58,138,0.15)] focus:bg-white" placeholder="Tulis atau salin isi berita di sini..."></textarea>
                </div>

                <div class="flex justify-end mt-2.5">
                    <button class="bg-primary-blue text-white border-none py-3.5 px-8 rounded-lg text-base font-semibold cursor-pointer transition-colors duration-200 hover:bg-primary-hover">Publikasikan Artikel</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/user.js"></script>
    <script src="js/ui-handler.js"></script>
</body>

</html>
