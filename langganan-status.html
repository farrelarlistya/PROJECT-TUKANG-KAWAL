<body class="!bg-[#f9fafb] !block">
    <header class="sticky top-0 flex shadow-[0_2px_12px_rgba(0,0,0,.25)] bg-navy justify-around items-center z-[2]">
        <div class="max-w-[1160px] px-6 flex items-center">
            <a href="index.html" class="font-playfair no-underline text-white text-[25px] font-bold"><span class="inline-flex items-center justify-center w-9 h-9 bg-linear-to-br from-brand to-[#7e85a7] text-white font-playfair text-[20px] mb-[5px] font-extrabold rounded-lg mr-2.5 shrink-0 align-middle leading-none">T</span>TukangKawal</a>
            <nav>
                <ul class="header-nav flex items-center gap-5 list-none transition-all duration-500 py-5 px-[30px]">
                    <li><a href="index.html?category=business" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Business</a></li>
                    <li><a href="index.html?category=entertainment" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Entertainment</a></li>
                    <li><a href="index.html?category=health" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Health</a></li>
                    <li><a href="index.html?category=science" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Science</a></li>
                    <li><a href="index.html?category=sports" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Sports</a></li>
                    <li><a href="index.html?category=technology" class="no-underline rounded-[5px] border-[rgb(220,220,220)] text-white p-[5px]">Technology</a></li>
                </ul>
            </nav>
        </div>
        <div class="header-action flex items-center gap-3">
        </div>
    </header>

    <main class="akun-layout max-w-[1100px] mx-auto py-10 px-6 pb-20 grid grid-cols-[280px_1fr] gap-10 min-h-[calc(100vh-200px)]">
        <!-- Sidebar -->
        <aside class="akun-sidebar bg-white rounded-xl border border-[#e5e7eb] shadow-[0_4px_6px_-1px_rgba(0,0,0,0.05),0_2px_4px_-1px_rgba(0,0,0,0.03)] py-7 px-5 h-fit sticky top-20">
            <div class="flex items-center gap-3.5 pb-6 border-b border-[#e5e7eb] mb-2">
                <div class="w-12 h-12 rounded-full bg-linear-to-br from-brand to-[#7e85a7] text-white flex items-center justify-center font-bold text-base tracking-[0.5px] shrink-0" id="sidebarAvatar">US</div>
                <div class="flex flex-col gap-[2px] overflow-hidden">
                    <span class="font-semibold text-[15px] text-[#111827] font-dm-sans" id="sidebarUsername">User</span>
                    <span class="text-[12px] text-[#6b7280] font-dm-sans whitespace-nowrap overflow-hidden text-ellipsis" id="sidebarEmail">user@gmail.com</span>
                </div>
            </div>

            <nav class="flex flex-col gap-[2px] pt-2">
                <a href="informasi-akun.html" class="flex items-center gap-3 py-3 px-3.5 rounded-lg no-underline text-[#6b7280] text-[14px] font-medium font-dm-sans transition-all duration-200 hover:bg-brand/[.06] hover:text-brand">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Informasi Akun
                </a>
                <a href="pengaturan-akun.html" class="flex items-center gap-3 py-3 px-3.5 rounded-lg no-underline text-[#6b7280] text-[14px] font-medium font-dm-sans transition-all duration-200 hover:bg-brand/[.06] hover:text-brand">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Pengaturan Akun
                </a>
                <a href="langganan-status.html" class="flex items-center gap-3 py-3 px-3.5 rounded-lg no-underline text-brand bg-brand/[.08] text-[14px] font-semibold font-dm-sans transition-all duration-200">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                    Langganan
                </a>
                <a href="#" class="flex items-center gap-3 py-3 px-3.5 rounded-lg no-underline text-[#6b7280] text-[14px] font-medium font-dm-sans transition-all duration-200 hover:bg-brand/[.06] hover:text-brand">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    Bantuan Pelanggan
                </a>

                <div class="h-px bg-[#e5e7eb] my-2"></div>

                <a href="#" class="flex items-center gap-3 py-3 px-3.5 rounded-lg no-underline text-[#dc2626] text-[14px] font-medium font-dm-sans transition-all duration-200 hover:bg-[rgba(220,38,38,0.06)] hover:text-[#b91c1c]" onclick="window.logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Keluar
                </a>
            </nav>
        </aside>

        <!-- Content Area -->
        <section class="akun-content bg-white rounded-xl border border-[#e5e7eb] shadow-[0_4px_6px_-1px_rgba(0,0,0,0.05),0_2px_4px_-1px_rgba(0,0,0,0.03)] p-10 h-fit">
            <h1 class="akun-page-title font-playfair text-[28px] text-[#111827] mb-8 pb-4 border-b border-[#e5e7eb]">Status Langganan</h1>

            <div id="langgananContent">
                <!-- Diisi oleh script -->
            </div>
        </section>
    </main>

    <script src="js/user.js"></script>
    <script src="js/ui-handler.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.getCurrentUser ? window.getCurrentUser() : null;
            if (!user) { window.location.href = 'login.html'; return; }

            // Isi sidebar
            const sidebarAvatar = document.getElementById('sidebarAvatar');
            const sidebarUsername = document.getElementById('sidebarUsername');
            const sidebarEmail = document.getElementById('sidebarEmail');
            if (sidebarAvatar) sidebarAvatar.textContent = user.initials || 'US';
            if (sidebarUsername) sidebarUsername.textContent = user.username;
            if (sidebarEmail) sidebarEmail.textContent = user.email;

            const container = document.getElementById('langgananContent');

            if (user.role === 'member') {
                // Hardcoded data langganan untuk member
                const memberData = {
                    plan: 'Langganan 1 Tahun',
                    status: 'Aktif',
                    startDate: '15 Januari 2026',
                    expiryDate: '15 Januari 2027',
                    price: 'Rp 411.600/tahun',
                    payment: 'BCA Virtual Account'
                };

                container.innerHTML = `
                    <div class="bg-[#eff6ff] border border-[#bfdbfe] rounded-xl p-6 mb-8 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-brand/20 flex items-center justify-center shrink-0">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        </div>
                        <div>
                            <h3 class="text-[16px] font-bold text-brand mb-1">Langganan Aktif</h3>
                            <p class="text-[14px] text-[#1e40af]">Anda memiliki akses penuh ke seluruh konten Pengawal Eksklusif.</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5 mb-8">
                        <div class="bg-[#f9fafb] rounded-lg p-5 border border-[#e5e7eb]">
                            <span class="text-[12px] text-[#6b7280] font-dm-sans uppercase tracking-wide">Status</span>
                            <p class="text-[18px] font-bold text-[#059669] mt-1 flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full bg-[#059669] inline-block"></span>
                                ${memberData.status}
                            </p>
                        </div>
                        <div class="bg-[#f9fafb] rounded-lg p-5 border border-[#e5e7eb]">
                            <span class="text-[12px] text-[#6b7280] font-dm-sans uppercase tracking-wide">Paket</span>
                            <p class="text-[18px] font-bold text-[#111827] mt-1">${memberData.plan}</p>
                        </div>
                        <div class="bg-[#f9fafb] rounded-lg p-5 border border-[#e5e7eb]">
                            <span class="text-[12px] text-[#6b7280] font-dm-sans uppercase tracking-wide">Berlaku Sejak</span>
                            <p class="text-[16px] font-semibold text-[#111827] mt-1">${memberData.startDate}</p>
                        </div>
                        <div class="bg-[#f9fafb] rounded-lg p-5 border border-[#e5e7eb]">
                            <span class="text-[12px] text-[#6b7280] font-dm-sans uppercase tracking-wide">Berlaku Sampai</span>
                            <p class="text-[16px] font-semibold text-[#111827] mt-1">${memberData.expiryDate}</p>
                        </div>
                    </div>

                    <div class="border-t border-[#e5e7eb] pt-6">
                        <h3 class="text-[16px] font-semibold text-[#111827] mb-4">Detail Pembayaran</h3>
                        <div class="flex flex-col gap-3">
                            <div class="flex justify-between text-[14px]">
                                <span class="text-[#6b7280]">Harga</span>
                                <span class="font-semibold text-[#111827]">${memberData.price}</span>
                            </div>
                            <div class="flex justify-between text-[14px]">
                                <span class="text-[#6b7280]">Metode Pembayaran</span>
                                <span class="font-semibold text-[#111827]">${memberData.payment}</span>
                            </div>
                            <div class="flex justify-between text-[14px]">
                                <span class="text-[#6b7280]">Perpanjangan Otomatis</span>
                                <span class="font-semibold text-[#059669]">Aktif</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // Non-member
                container.innerHTML = `
                    <div class="bg-[#f9fafb] border border-[#e5e7eb] rounded-xl p-8 text-center">
                        <div class="w-16 h-16 rounded-full bg-[#e5e7eb] flex items-center justify-center mx-auto mb-4">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                        </div>
                        <h3 class="text-[18px] font-bold text-[#374151] mb-2">Belum Berlangganan</h3>
                        <p class="text-[14px] text-[#6b7280] mb-6 max-w-[380px] mx-auto leading-[1.6]">Anda belum memiliki langganan aktif. Berlangganan untuk mendapatkan akses penuh ke seluruh konten Pengawal Eksklusif.</p>
                        <a href="langganan.html" class="inline-block bg-brand text-white py-3 px-8 rounded-lg no-underline text-[15px] font-semibold transition-all duration-200 hover:bg-brand-hover hover:-translate-y-[1px]">Mulai Berlangganan</a>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
