<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tukang Kawal</title>
    <link href="./src/output.css" rel="stylesheet">
</head>
<body>
    <header class="sticky top-0 flex shadow-[0_2px_12px_rgba(0,0,0,.25)] bg-navy justify-center items-center z-[2] p-[15px]">
        <a href="index.html" class="font-playfair no-underline text-white text-[25px] font-bold"><span class="inline-flex items-center justify-center w-9 h-9 bg-linear-to-br from-brand to-[#7e85a7] text-white font-playfair text-[20px] mb-[5px] font-extrabold rounded-lg mr-2.5 shrink-0 align-middle leading-none">T</span>TukangKawal</a>
    </header>

    <main class="flex justify-center pt-[21.5px]">
        <div class="border border-[#e0e0e0] rounded-[10px] py-10 px-[50px] shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
            <h1 class="text-[25px] mb-[5px]">Masuk</h1>
            <p class="text-[15px] text-[#666]">Masuk ke akun Anda untuk melanjutkan membaca</p>
            
            <form action="#" method="post" class="flex flex-col">
                <div class="flex flex-col">
                    <label for="namaEmail" class="text-[14px] text-[#333] mb-[5px] mt-5">Username</label>
                    <input type="text" id="namaEmail" name="namaEmail" class="text-[15px] font-thin py-3 px-[15px] shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-[#e0e0e0] rounded-lg bg-white outline-none focus:border-brand" placeholder="Masukkan Username" required>
                </div>

                <div class="flex flex-col">
                    <label for="password" class="text-[14px] text-[#333] mb-[5px] mt-5">Kata Sandi</label>
                    <input type="password" id="password" name="password" class="text-[15px] font-thin py-3 px-[15px] shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-[#e0e0e0] rounded-lg bg-white outline-none focus:border-brand" placeholder="Masukkan Password" required>
                </div>

                <a href="resetPass" class="text-[14px] no-underline text-end font-medium mt-2.5 mb-[30px]">Lupa Kata Sandi?</a>

                <button type="submit" class="text-[15px] font-semibold text-white bg-brand py-[13px] rounded-lg border-none cursor-pointer transition-all duration-200 w-full hover:bg-brand-hover hover:-translate-y-[1px]">Masuk</button>
            </form>
            
            <p class="alternatif-option mt-[30px] text-center text-[#666] text-[14px] relative flex items-center justify-center">Atau masuk dengan</p>

            <a href="https://google.com" class="mt-5 flex justify-center items-center p-2.5 rounded-lg border border-[#e0e0e0] no-underline transition-colors duration-200 hover:bg-[#f5f5f5]">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png" alt="Google Logo" class="w-6 h-6">
            </a>

            <p class="mt-[35px] text-center text-[#555] text-[15px]">Belum mempunyai akun? 
                <a href="register.html" class="no-underline text-brand font-semibold hover:underline">Daftar</a>
            </p>
        </div>
    </main>

    <script src="js/user.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
