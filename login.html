<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tukang Kawal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/form.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <header style="justify-content: center; padding: 15px;">
        <a href="index.html" class="header-brand"><span class="header-logo">T</span>TukangKawal</a>
    </header>

    <main class="main">
        <div class="register-card">
            <h1 class="register-title">Masuk</h1>
            <p class="register-subtitle">Masuk ke akun Anda untuk melanjutkan membaca</p>
            
            <form action="#" method="post" class="register-form">
                <div class="form-group">
                    <label for="namaEmail" class="form-label">Username</label>
                    <input type="text" id="namaEmail" name="namaEmail" class="form-input" placeholder="Masukkan Username" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Kata Sandi</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Masukkan Password" required>
                </div>

                <a href="resetPass" class="reset-pass">Lupa Kata Sandi?</a>

                <button type="submit" class="btn-submit">Masuk</button>
            </form>
            
            <p class="alternatif-option">Atau masuk dengan</p>

            <a href="https://google.com" class="link-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png" alt="Google Logo" class="google-logo">
            </a>

            <p class="logReg">Belum mempunyai akun? 
                <a href="register.html" class="link-logReg">Daftar</a>
            </p>
        </div>
    </main>

    <script src="js/user.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
