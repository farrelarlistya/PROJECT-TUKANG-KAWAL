<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Tukang Kawal</title>
    <link href="./src/output.css" rel="stylesheet">
</head>

<body>
    <header class="sticky top-0 flex shadow-[0_2px_12px_rgba(0,0,0,.25)] bg-navy justify-center items-center z-[2] p-[15px]">
        <a href="index.html" class="font-playfair no-underline text-white text-[25px] font-bold"><span class="inline-flex items-center justify-center w-9 h-9 bg-linear-to-br from-brand to-[#7e85a7] text-white font-playfair text-[20px] mb-[5px] font-extrabold rounded-lg mr-2.5 shrink-0 align-middle leading-none">T</span>TukangKawal</a>
    </header>

    <main class="flex justify-center pt-[21.5px]">
        <div class="border border-[#e0e0e0] rounded-[10px] py-10 px-[50px] shadow-[0_2px_8px_rgba(0,0,0,0.06)]">
            <h1 class="text-[25px] mb-[5px]">Daftar Sebagai Pengawal Baru</h1>
            <p class="text-[15px] text-[#666]">Bergabunglah dengan komunitas pengawal berita</p>

            <form action="#" method="POST" class="flex flex-col">
                <div class="flex flex-col">
                    <label for="nama" class="text-[14px] text-[#333] mb-[5px] mt-5">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" class="text-[15px] font-thin py-3 px-[15px] shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-[#e0e0e0] rounded-lg bg-white outline-none focus:border-brand" placeholder="Masukkan nama lengkap"
                        required>
                </div>

                <div class="flex flex-col">
                    <label for="usn" class="text-[14px] text-[#333] mb-[5px] mt-5">Username</label>
                    <input type="text" name="usn" id="usn" class="text-[15px] font-thin py-3 px-[15px] shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-[#e0e0e0] rounded-lg bg-white outline-none focus:border-brand" placeholder="Masukkan username" required>
                </div>

                <div class="flex flex-col">
                    <label for="email" class="text-[14px] text-[#333] mb-[5px] mt-5">Email</label>
                    <input type="email" id="email" name="email" class="text-[15px] font-thin py-3 px-[15px] shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-[#e0e0e0] rounded-lg bg-white outline-none focus:border-brand" placeholder="nama@email.com"
                        required>
                </div>

                <div class="flex flex-col">
                    <label for="password" class="text-[14px] text-[#333] mb-[5px] mt-5">Kata Sandi</label>
                    <input type="password" id="password" name="password" class="text-[15px] font-thin py-3 px-[15px] shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-[#e0e0e0] rounded-lg bg-white outline-none focus:border-brand"
                        placeholder="Minimal 8 karakter" required minlength="8">
                </div>

                <div class="flex flex-col">
                    <label for="confirm-password" class="text-[14px] text-[#333] mb-[5px] mt-5">Konfirmasi Kata Sandi</label>
                    <input type="password" id="confirm-password" name="confirm-password" class="text-[15px] font-thin py-3 px-[15px] shadow-[0_2px_8px_rgba(0,0,0,0.06)] border border-[#e0e0e0] rounded-lg bg-white outline-none focus:border-brand"
                        placeholder="Masukkan ulang kata sandi" required minlength="8">
                </div>

                <div class="flex items-center gap-2 mt-2.5 mb-[25px]">
                    <input type="checkbox" id="terms" name="terms" required class="w-4 h-4 cursor-pointer accent-brand shrink-0">
                    <label for="terms" class="text-[#555] text-[14px] cursor-pointer leading-[1.4]">Saya setuju dengan <a href="#" class="text-brand underline font-semibold">Syarat &amp; Ketentuan</a> dan <a
                            href="#" class="text-brand underline font-semibold">Kebijakan Privasi</a></label>
                </div>

                <button type="submit" class="text-[15px] font-semibold text-white bg-brand py-[13px] rounded-lg border-none cursor-pointer transition-all duration-200 w-full hover:bg-brand-hover hover:-translate-y-[1px]">Daftar Sekarang</button>
            </form>
            <p class="mt-[35px] text-center text-[#555] text-[15px]">Sudah mempunyai akun? 
                <a href="login.html" class="no-underline text-brand font-semibold hover:underline">Masuk</a>
            </p>
        </div>
    </main>
</body>
</html>
